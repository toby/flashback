name: Example drift

on:
  pull_request:
    paths:
      - 'corpus/**'
      - 'examples/**'
      - 'scripts/flashback-examples.mjs'
      - 'package.json'
      - '.github/workflows/example-drift.yml'
  push:
    branches:
      - main
    paths:
      - 'corpus/**'
      - 'examples/**'
      - 'scripts/flashback-examples.mjs'
      - 'package.json'
      - '.github/workflows/example-drift.yml'

jobs:
  check-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check generated examples
        run: npm run check:examples
